# Module build groups for parallel CI builds.
#
# Each group builds independently in its own Docker container.
# Groups must list their modules in dependency order.
#
# The "core" group builds from epics-base-developer. All other groups
# build from ioc-asyn-developer which already includes core modules.
# Set "base_image" to override the default base (ioc-asyn).
#
# Any module with a *.install.yml that is NOT listed in any group
# is automatically assigned to the "uncategorized" group. This ensures
# new modules are always tested without manual config updates.
#
# Modules listed in "skip" are excluded from all CI builds.
#
# Run `python _scripts/build_matrix.py` to see the generated matrix
# and check for uncategorized modules.

skip:
  - pvaDriver

groups:
  core:
    desc: "Core EPICS support modules (dependencies for most others)"
    base_image: epics-base
    modules:
      - calc
      - sscan
      - asyn
      - busy
      - autosave
      - sequencer
      - std

  motor:
    desc: "Motor stack"
    modules:
      - motor
      - motorMotorSim
      - motorNewport
      - pmac
      - optics

  areadetector:
    desc: "Area detector stack"
    modules:
      - ADCore
      - ADGenICam
      - ADAravis
      - ADSimDetector
      - ADAndor3
      - ADURL
      - ADZMQ
      - ffmpegServer
      - xspress3
      - quadEM

  general:
    desc: "General-purpose modules with few dependencies"
    modules:
      - modbus
      - iocStats
      - pvxs
      - pvlogging
      - opcua
      - positioner

  fieldbus:
    desc: "Fieldbus and simple protocol modules"
    modules:
      - StreamDevice
      - snmp
      - ether_ip
      - FINS
      - digitelMpc
      - lakeshore340
      - mks937a
      - mks937b
      - terminalserver
