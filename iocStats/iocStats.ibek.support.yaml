# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: devIocStats

entity_models:
  - name: iocAdminVxWorks
    description: |-
      Create some records for reading IOC statistics and details.
    parameters:
      IOC:
        type: str
        description: |-
          Device prefix

    databases:
      - file: $(IOCSTATS)/db/iocAdminVxWorks.db
        args:
          IOC:

  - name: iocAdminScanMon
    description: |-
      Create some records for reading IOC statistics and details.
    parameters:
      IOC:
        type: str
        description: |-
          Device prefix

    databases:
      - file: $(IOCSTATS)/db/iocAdminScanMon.db
        args:
          IOC:

  - name: iocAdminSoft
    description: |-
      Create some records for reading IOC statistics and details.
    parameters:
      IOC:
        type: str
        description: |-
          Device prefix

    databases:
      - file: $(IOCSTATS)/db/iocAdminSoft.db
        args:
          IOC:

      - file: $(IOCSTATS)/db/iocAdminScanMon.db
        args:
          IOC:
