            read_widget:
              type: TextRead

          - type: SignalRW
            name: NBitNumBits
            description: N-bit compression filter; number of data bits per pixel
            write_pv: $(P)$(R)NumDataBits
            write_widget:
              type: TextWrite
            read_pv: $(P)$(R)NumDataBits_RBV
            read_widget:
              type: TextRead

          - type: SignalRW
