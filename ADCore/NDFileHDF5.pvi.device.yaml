label: NDFileHDF5
children:
  - type: Include
    file_name: NDFile

  - type: IgnoredComponent
    name: Produce

  - type: Group
    name: SWMR
    label: SWMR Details
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalR
        name: SWMRSupported
        label: Supported
        read_pv: $(P)$(R)SWMRSupported_RBV
        read_widget:
          type: LED

      - type: SignalRW
        name: SWMRMode
        label: Use SWMR
        write_pv: $(P)$(R)SWMRMode
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)SWMRMode_RBV
        read_widget:
          type: LED

      - type: SignalR
        name: SWMRActive
        label: Active
        read_pv: $(P)$(R)SWMRActive_RBV
        read_widget:
          type: LED

      - type: SignalR
        name: SWMRCbCounter
        label: Flushing Callbacks
        read_pv: $(P)$(R)SWMRCbCounter_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: NumFramesFlush
        description: Flush on Nth Frame
        write_pv: $(P)$(R)NumFramesFlush
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)NumFramesFlush_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: NDAttributeFlush
        label: AttributeFlush
        write_pv: $(P)$(R)NDAttributeChunk
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)NDAttributeChunk_RBV
        read_widget:
          type: TextRead

      - type: SignalW
        name: FlushNow
        write_pv: $(P)$(R)FlushNow
        write_widget:
          type: ToggleButton

