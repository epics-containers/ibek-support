label: NDROI
children:

- type: Include
  file_name: NDPluginBase

- type: Group
  name: ConsumeXYZ
  label: Consume XYZ
  layout:
    type: Grid
    labelled: true
    stacked: true

  children:

    - type: Group
      name: MaxSizeRow
      label: Max Size
      layout:
        type: Row
        header:
          - X
          - Y
          - Z
      children:

      - type: SignalR
        name: MaxSizeX
        read_pv: $(P)$(R)MaxSizeX_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: MaxSizeY
        read_pv: $(P)$(R)MaxSizeY_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: MaxSizeZ
        read_pv: $(P)$(R)MaxSizeZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: EnableRow
      label: Enable
      layout:
        type: Row
      children:

      - type: SignalRW
        name: EnableX
        write_pv: $(P)$(R)EnableX
        write_widget:
          type: ComboBox
          choices:
            - Disable
            - Enable
        read_pv: $(P)$(R)EnableX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: EnableY
        write_pv: $(P)$(R)EnableY
        write_widget:
          type: ComboBox
          choices:
            - Disable
            - Enable
        read_pv: $(P)$(R)EnableY_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: EnableZ
        write_pv: $(P)$(R)EnableZ
        write_widget:
          type: ComboBox
          choices:
            - Disable
            - Enable
        read_pv: $(P)$(R)EnableZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: BinRow
      label: Bin
      layout:
        type: Row
      children:

      - type: SignalRW
        name: BinX
        write_pv: $(P)$(R)BinX
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)BinX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: BinY
        write_pv: $(P)$(R)BinY
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)BinY_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: BinZ
        write_pv: $(P)$(R)BinZ
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)BinZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: MinRow
      label: Min
      layout:
        type: Row
      children:

      - type: SignalRW
        name: MinX
        write_pv: $(P)$(R)MinX
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)MinX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: MinY
        write_pv: $(P)$(R)MinY
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)MinY_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: MinZ
        write_pv: $(P)$(R)MinZ
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)MinZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: SizeRow
      label: Size
      layout:
        type: Row
      children:

      - type: SignalRW
        name: SizeX
        write_pv: $(P)$(R)SizeX
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)SizeX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: SizeY
        write_pv: $(P)$(R)SizeY
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)SizeY_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: SizeZ
        write_pv: $(P)$(R)SizeZ
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)SizeZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: AutoSizeRow
      label: Auto Size
      layout:
        type: Row
      children:

      - type: SignalRW
        name: AutoSizeX
        write_pv: $(P)$(R)AutoSizeX
        write_widget:
          type: ComboBox
          choices:
            - No
            - Yes
        read_pv: $(P)$(R)AutoSizeX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: AutoSizeY
        write_pv: $(P)$(R)AutoSizeY
        write_widget:
          type: ComboBox
          choices:
            - No
            - Yes
        read_pv: $(P)$(R)AutoSizeY_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: AutoSizeZ
        write_pv: $(P)$(R)AutoSizeZ
        write_widget:
          type: ComboBox
          choices:
            - No
            - Yes
        read_pv: $(P)$(R)AutoSizeZ_RBV
        read_widget:
          type: TextRead

    - type: Group
      name: ReverseRow
      label: Reverse
      layout:
        type: Row
      children:

      - type: SignalRW
        name: ReverseX
        write_pv: $(P)$(R)ReverseX
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)ReverseX_RBV
        read_widget:
          type: LED

      - type: SignalRW
        name: ReverseY
        write_pv: $(P)$(R)ReverseY
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)ReverseY_RBV
        read_widget:
          type: LED

      - type: SignalRW
        name: ReverseZ
        write_pv: $(P)$(R)ReverseZ
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)ReverseZ_RBV
        read_widget:
          type: LED

    - type: Group
      name: ArraySizeRow
      label: Array Size
      layout:
        type: Row
      children:

      - type: SignalR
        name: ArraySizeX
        read_pv: $(P)$(R)ArraySizeX_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: ArraySizeY
        read_pv: $(P)$(R)ArraySizeY_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: ArraySizeZ
        read_pv: $(P)$(R)ArraySizeZ_RBV
        read_widget:
          type: TextRead

- type: Group
  name: Produce
  layout:
    type: Grid
    labelled: true
  children:

  - type: SignalRW
    name: Name
    write_pv: $(P)$(R)Name
    write_widget:
      type: TextWrite
    read_pv: $(P)$(R)Name_RBV
    read_widget:
      type: TextRead

  - type: SignalRW
    name: DataTypeOut
    label: Data Type Out
    write_pv: $(P)$(R)DataTypeOut
    write_widget:
      type: ComboBox
      choices:
        - Automatic
        - Int8
        - UInt8
        - Int16
        - UInt16
        - Int32
        - Float32
        - Float64
    read_pv: $(P)$(R)DataTypeOut_RBV
    read_widget:
      type: TextRead

  - type: SignalRW
    name: EnableScale
    label: Enable Scale
    write_pv: $(P)$(R)EnableScale
    write_widget:
      type: ToggleButton
    read_pv: $(P)$(R)EnableScale_RBV
    read_widget:
      type: LED

  - type: SignalRW
    name: Scale
    write_pv: $(P)$(R)Scale
    write_widget:
      type: TextWrite
    read_pv: $(P)$(R)Scale_RBV
    read_widget:
      type: TextRead

  - type: SignalRW
    name: CollapseDims
    label: Collapse Dims
    write_pv: $(P)$(R)CollapseDims
    write_widget:
      type: ToggleButton
    read_pv: $(P)$(R)CollapseDims_RBV
    read_widget:
      type: LED
