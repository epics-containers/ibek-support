label: ADDriver
children:
  - type: Group
    name: Info
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalR
        name: Manufacturer
        read_pv: $(P)$(R)Manufacturer_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: Model
        read_pv: $(P)$(R)Model_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: SerialNumber
        read_pv: $(P)$(R)SerialNumber_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: FirmwareVersion
        read_pv: $(P)$(R)FirmwareVersion_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: SDKVersion
        read_pv: $(P)$(R)SDKVersion_RBV
        read_widget:
          type: TextRead

  - type: Group
    name: Readout
    layout:
      type: Grid
      labelled: true
    children:

      - type: Group
        name: MaxSizeRow
        label: Max Size
        layout:
          type: Row
          header:
            - X
            - Y
        children:

        - type: SignalR
          name: MaxSizeXTable
          label: Max Size X
          read_pv: $(P)$(R)MaxSizeX_RBV
          read_widget:
            type: TextRead

        - type: SignalR
          name: MaxSizeYTable
          label: Max Size Y
          read_pv: $(P)$(R)MaxSizeY_RBV
          read_widget:
            type: TextRead

      - type: Group
        name: BinRow
        label: Bin
        layout:
          type: Row
        children:

        - type: SignalRW
          name: BinXTable
          label: Bin X
          write_pv: $(P)$(R)BinX
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)BinX_RBV
          read_widget:
            type: TextRead

        - type: SignalRW
          name: BinYTable
          label: Bin Y
          write_pv: $(P)$(R)BinY
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)BinY_RBV
          read_widget:
            type: TextRead

      - type: Group
        name: MinRow
        label: Min
        layout:
          type: Row
        children:

        - type: SignalRW
          name: MinXTable
          label: Min X
          write_pv: $(P)$(R)MinX
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)MinX_RBV
          read_widget:
            type: TextRead

        - type: SignalRW
          name: MinYTable
          label: Min Y
          write_pv: $(P)$(R)MinY
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)MinY_RBV
          read_widget:
            type: TextRead

      - type: Group
        name: ReverseRow
        label: Reverse
        layout:
          type: Row
        children:

        - type: SignalRW
          name: ReverseXTable
          label: Reverse X
          write_pv: $(P)$(R)ReverseX
          write_widget:
            type: ToggleButton
          read_pv: $(P)$(R)ReverseX_RBV
          read_widget:
            type: LED

        - type: SignalRW
          name: ReverseYTable
          label: Reverse Y
          write_pv: $(P)$(R)ReverseY
          write_widget:
            type: ToggleButton
          read_pv: $(P)$(R)ReverseY_RBV
          read_widget:
            type: LED

      - type: Group
        name: SizeRow
        label: Size
        layout:
          type: Row
        children:

        - type: SignalRW
          name: SizeXTable
          label: Size X
          write_pv: $(P)$(R)SizeX
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)SizeX_RBV
          read_widget:
            type: TextRead

        - type: SignalRW
          name: SizeYTable
          label: Size Y
          write_pv: $(P)$(R)SizeY
          write_widget:
            type: TextWrite
          read_pv: $(P)$(R)SizeY_RBV
          read_widget:
            type: TextRead

  - type: Group
    name: Collect
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalRW
        name: Acquire
        write_pv: $(P)$(R)Acquire
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)Acquire_RBV
        read_widget:
          type: LED

      - type: SignalR
        name: AcquireBusyCB
        description: High while waiting for plugins
        read_pv: $(P)$(R)AcquireBusyCB
        read_widget:
          type: LED

      - type: SignalW
        name: WaitForPlugins
        write_pv: $(P)$(R)WaitForPlugins
        write_widget:
          type: ToggleButton

      - type: SignalRW
        name: AcquireTime
        write_pv: $(P)$(R)AcquireTime
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)AcquireTime_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: AcquirePeriod
        write_pv: $(P)$(R)AcquirePeriod
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)AcquirePeriod_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: Gain
        write_pv: $(P)$(R)Gain
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)Gain_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: NumImages
        write_pv: $(P)$(R)NumImages
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)NumImages_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: NumImagesCounter
        read_pv: $(P)$(R)NumImagesCounter_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: NumExposures
        write_pv: $(P)$(R)NumExposures
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)NumExposures_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: NumExposuresCounter
        read_pv: $(P)$(R)NumExposuresCounter_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: ImageMode
        write_pv: $(P)$(R)ImageMode
        write_widget:
          type: ComboBox
        read_pv: $(P)$(R)ImageMode_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: TriggerMode
        write_pv: $(P)$(R)TriggerMode
        write_widget:
          type: ComboBox
        read_pv: $(P)$(R)TriggerMode_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: DetectorState
        read_pv: $(P)$(R)DetectorState_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatusMessage
        read_pv: $(P)$(R)StatusMessage_RBV
        read_widget:
          type: TextRead
          format: string

      - type: SignalR
        name: TimeRemaining
        read_pv: $(P)$(R)TimeRemaining_RBV
        read_widget:
          type: TextRead

  - type: Include
    file_name: NDArrayBase

  - type: Group
    name: Advanced
    layout:
      type: SubScreen
      labelled: false
    children:
      - type: Group
        name: Shutter
        layout:
          type: Grid
          labelled: true
        children:
          - type: SignalR
            name: ShutterStatus
            label: Epics Shutter Status
            read_pv: $(P)$(R)ShutterStatus_RBV
            read_widget:
              type: LED
          - type: SignalRW
            name: ShutterMode
            write_pv: $(P)$(R)ShutterMode
            write_widget:
              type: ComboBox
            read_pv: $(P)$(R)ShutterMode_RBV
            read_widget:
              type: TextRead

          - type: SignalRW
            name: ShutterControl
            write_pv: $(P)$(R)ShutterControl
            write_widget:
              type: ToggleButton
            read_pv: $(P)$(R)ShutterControl_RBV
            read_widget:
              type: LED

          - type: SignalRW
            name: ShutterOpenDelay
            write_pv: $(P)$(R)ShutterOpenDelay
            write_widget:
              type: TextWrite
            read_pv: $(P)$(R)ShutterOpenDelay_RBV
            read_widget:
              type: TextRead

          - type: SignalRW
            name: ShutterCloseDelay
            write_pv: $(P)$(R)ShutterCloseDelay
            write_widget:
              type: TextWrite
            read_pv: $(P)$(R)ShutterCloseDelay_RBV
            read_widget:
              type: TextRead

          - type: SignalR
            name: ShutterControlEPICS
            read_pv: $(P)$(R)ShutterControlEPICS
            read_widget:
              type: LED

          - type: SignalR
            name: ShutterOpenEPICS
            read_pv: $(P)$(R)ShutterOpenEPICS
            read_widget:
              type: LED

          - type: SignalR
            name: ShutterCloseEPICS
            read_pv: $(P)$(R)ShutterCloseEPICS
            read_widget:
              type: LED

      - type: Group
        name: Advanced
        layout:
          type: Grid
          labelled: true
        children:
          - type: SignalRW
            name: FrameType
            write_pv: $(P)$(R)FrameType
            write_widget:
              type: ComboBox
            read_pv: $(P)$(R)FrameType_RBV
            read_widget:
              type: TextRead

          - type: SignalR
            name: TemperatureActual
            read_pv: $(P)$(R)TemperatureActual
            read_widget:
              type: TextRead

          - type: SignalRW
            name: Temperature
            write_pv: $(P)$(R)Temperature
            write_widget:
              type: TextWrite
            read_pv: $(P)$(R)Temperature_RBV
            read_widget:
              type: TextRead

          - type: SignalW
            name: ReadStatus
            write_pv: $(P)$(R)ReadStatus
            write_widget:
              type: ToggleButton

          - type: SignalR
            name: StringToServer
            read_pv: $(P)$(R)StringToServer_RBV
            read_widget:
              type: TextRead
              format: string

          - type: SignalR
            name: StringFromServer
            read_pv: $(P)$(R)StringFromServer_RBV
            read_widget:
              type: TextRead
              format: string
