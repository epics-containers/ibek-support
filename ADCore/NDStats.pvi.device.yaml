          type: TextWrite
        read_pv: $(P)$(R)CursorX_RBV
        read_widget:
          type: TextRead

      - type: SignalRW
        name: CursorY
        write_pv: $(P)$(R)CursorY
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)CursorY_RBV
        read_widget:
          type: TextRead

  - type: Group
