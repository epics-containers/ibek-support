          - type: SignalR
            name: SigmaValue
            read_pv: $(P)$(R)Sigma_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSigma
            read_pv: $(P)$(R)TSSigma
            read_widget:
              type: ArrayTrace
              axis: Sigma Value

      - type: Group
        name: Eccentricity
        layout:
          type: Row
        children:
          - type: SignalR
            name: Eccentricity
            read_pv: $(P)$(R)Eccentricity_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSEccentricity
            read_pv: $(P)$(R)TSEccentricity
            read_widget:
              type: ArrayTrace
              axis: Eccentricity

      - type: Group
        name: Orientation
        layout:
          type: Row
        children:
          - type: SignalR
            name: Orientation
            read_pv: $(P)$(R)Orientation_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSOrientation
            read_pv: $(P)$(R)TSOrientation
            read_widget:
              type: ArrayTrace
              axis: Orientation

  - type: Group
    name: Profiles
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalRW
        name: ComputeProfiles
        write_pv: $(P)$(R)ComputeProfiles
