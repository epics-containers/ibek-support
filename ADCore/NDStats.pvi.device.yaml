# yaml-language-server: $schema=/workspaces/pvi/schemas/pvi.device.schema.json

label: NDStats
children:
  - type: Include
    file_name: NDPluginBase

  - type: IgnoredComponent
    name: Produce

  - type: Group
    name: Centroids
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalRW
        name: ComputeCentroid
        write_pv: $(P)$(R)ComputeCentroid
        write_widget:
          type: ToggleButton
        read_pv: $(P)$(R)ComputeCentroid_RBV
        read_widget:
          type: LED

      - type: SignalRW
        name: CentroidThreshold
        write_pv: $(P)$(R)CentroidThreshold
        write_widget:
          type: TextWrite
        read_pv: $(P)$(R)CentroidThreshold_RBV
        read_widget:
          type: TextRead

      - type: Group
        name: CentroidTotal
        layout:
          type: Row
        children:
          - type: SignalR
            name: CentroidTotal
            read_pv: $(P)$(R)CentroidTotal_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSCentroidTotal
            read_pv: $(P)$(R)TSCentroidTotal
            read_widget:
              type: ArrayTrace
              axis: Centroid Total

      - type: Group
        name: CentroidX
        layout:
          type: Row
        children:
          - type: SignalR
            name: CentroidX
            read_pv: $(P)$(R)CentroidX_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSCentroidX
            label: Centroid X
            read_pv: $(P)$(R)TSCentroidX
            read_widget:
              type: ArrayTrace
              axis: Centroid X

      - type: Group
        name: CentroidY
        layout:
          type: Row
        children:
          - type: SignalR
            name: CentroidY
            read_pv: $(P)$(R)CentroidY_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSCentroidY
            label: Centroid Y
            read_pv: $(P)$(R)TSCentroidY
            read_widget:
              type: ArrayTrace
              axis: Centroid Y

      - type: Group
        name: SigmaX
        layout:
          type: Row
        children:
          - type: SignalR
            name: SigmaX
            read_pv: $(P)$(R)SigmaX_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSigmaX
            label: Sigma X
            read_pv: $(P)$(R)TSSigmaX
            read_widget:
              type: ArrayTrace
              axis: Sigma X

      - type: Group
        name: SigmaY
        layout:
          type: Row
        children:
          - type: SignalR
            name: SigmaY
            read_pv: $(P)$(R)SigmaY_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSigmaY
            label: Sigma Y
            read_pv: $(P)$(R)TSSigmaY
            read_widget:
              type: ArrayTrace
              axis: Sigma Y

      - type: Group
        name: SkewX
        layout:
          type: Row
        children:
          - type: SignalR
            name: SkewX
            read_pv: $(P)$(R)SkewX_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSkewX
            read_pv: $(P)$(R)TSSkewX
            read_widget:
              type: ArrayTrace
              axis: Skew X

      - type: Group
        name: SkewY
        layout:
          type: Row
        children:
          - type: SignalR
            name: SkewY
            read_pv: $(P)$(R)SkewY_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSkewY
            read_pv: $(P)$(R)TSSkewY
            read_widget:
              type: ArrayTrace
              axis: Skew Y

      - type: Group
        name: KurtosisX
        layout:
          type: Row
        children:
          - type: SignalR
            name: KurtosisX
            read_pv: $(P)$(R)KurtosisX_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSKurtosisX
            read_pv: $(P)$(R)TSKurtosisX
            read_widget:
              type: ArrayTrace
              axis: Kurtosis X

      - type: Group
        name: KurtosisY
        layout:
          type: Row
        children:
          - type: SignalR
            name: KurtosisY
            read_pv: $(P)$(R)KurtosisY_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSKurtosisY
            read_pv: $(P)$(R)TSKurtosisY
            read_widget:
              type: ArrayTrace
              axis: Kurtosis Y

      - type: Group
        name: SigmaXY
        layout:
          type: Row
        children:
          - type: SignalR
            name: SigmaXY
            read_pv: $(P)$(R)SigmaXY_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSSigmaXY
            label: Sigma XY
            read_pv: $(P)$(R)TSSigmaXY
            read_widget:
              type: ArrayTrace
              axis: Sigma XY

      - type: Group
        name: Sigma
        layout:
          type: Row
