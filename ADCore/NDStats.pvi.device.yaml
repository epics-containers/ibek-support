        children:
          - type: SignalR
            name: MaxValue
            label: Maximum
            read_pv: $(P)$(R)MaxValue_RBV
            read_widget:
              type: TextRead
          - type: SignalR
            name: TSMaxValue
            read_pv: $(P)$(R)TSMaxValue
            read_widget:
              type: ArrayTrace
