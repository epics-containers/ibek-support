      - type: SignalR
        name: ProfileSizeX
        read_pv: $(P)$(R)ProfileSizeX_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: ProfileSizeY
        read_pv: $(P)$(R)ProfileSizeY_RBV
        read_widget:
          type: TextRead

      - type: Group
        name: Plots
        layout:
          type: SubScreen
        children:
