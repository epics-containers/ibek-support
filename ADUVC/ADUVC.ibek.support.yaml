# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.1.2/ibek.support.schema.json

module: ADUVC

entity_models:
  - name: UVC
    description: |-
      Controls a USB Video Class device.
      Automatically creates an NDStdArrays plugin for array output.
    parameters:
      P:
        type: str
        description: Device Prefix

      R:
        type: str
        description: Device Suffix

      PORT:
        type: id
        description: Port name for the detector

      serial:
        type: str
        description: Serial number, leave blank if using productID
        default: ""

      productID:
        type: str
        description: Product ID, leave blank if using serial number
        default: ""

      TIMEOUT:
        type: int 
        description: Timeout
        default: 1

      ADDR:
        type: int
        description: Asyn Port address
        default: 0

    pre_init:
      - value: |
          # ADUVCConfig(portName, serialOrProductID)
          ADUVCConfig("{{PORT}}", "{% if serial %}{{serial}}{% else %}{{productID}}{% endif %}")

          # NDStdArraysConfigure(portName, queueSize, blockingCallbacks, NDArrayPort, NDArrayAddr, maxBuffers, maxMemory, priority, stackSize, maxThreads)
          NDStdArraysConfigure("{{PORT}}.ARR", 2, 0, "{{PORT}}", 0, 0, 0, 0, 0, 1)

    databases:
      - file: $(ADCORE)/db/ADBase.template
        args:
          P:
          R:
          PORT:
          TIMEOUT:
          ADDR:

      - file: $(ADUVC)/db/ADUVC.template
        args:
          P:
          R:
          PORT:
          TIMEOUT:
          ADDR:
          
      - file: $(ADCORE)/db/NDStdArrays.template
        args:
          P:
          R: ":ARR:"
          PORT: "{{PORT}}.ARR"
          NDARRAY_PORT: "{{PORT}}"
          TYPE: Int16
          FTVL: SHORT
          NELEMENTS: "6000000"
          TIMEOUT: "{{TIMEOUT}}"
          ADDR: "{{ADDR}}"

    pvi:
      yaml_path: ADUVC.pvi.device.yaml
      ui_macros:
        P:
        R:
      pv: true
      pv_prefix: $(P)$(R)
