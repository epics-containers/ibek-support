name: Check that ibek-support support modules will build in a container

on:
  push:
  pull_request:

jobs:
  check-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run schema/ioc instance generation tests
        run: |
          pip install -r requirements.txt
          bash tests/test_generate.sh

  # Generate the build matrix from build-groups.yml + auto-discovered modules
  generate-matrix:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate matrix
        id: matrix
        run: python _scripts/build_matrix.py --github >> "$GITHUB_OUTPUT"

      - name: Warn about uncategorized modules
        run: python _scripts/build_matrix.py --check || echo "::warning::Uncategorized modules detected - add them to build-groups.yml"

  # Build each module group in parallel
  check-docker-build-group:
    needs: generate-matrix
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    runs-on: ubuntu-latest
    name: "build-${{ matrix.group }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GitHub GHCR
        uses: docker/login-action@v1
        with:
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build group ${{ matrix.group }}
        uses: docker/build-push-action@v5
        with:
          file: Dockerfile.ci
          context: .
          build-args: |
            BUILD_GROUP=${{ matrix.group }}
            ${{ matrix.base_image && format('DEVELOPER=ghcr.io/epics-containers/{0}-developer:7.0.10ec1', matrix.base_image) || '' }}
          cache-from: type=gha,scope=group-${{ matrix.group }}
          cache-to: type=gha,mode=max,scope=group-${{ matrix.group }}
          tags: ci_test_${{ matrix.group }}
          load: true

  # Also keep the per-IOC builds for integration testing
  check-docker-build:
    # pull requests are a duplicate of a branch push if within the same repo.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        repo:
          [
            ioc-adaravis,
            ioc-pmac,
            ioc-lakeshore340,
            ioc-tetramm,
            ioc-motorSim,
            ioc-adsimdetector,
          ]
        include:
          - os: ubuntu-latest
            epics-target: linux-x86_64
            extension: ""
            platform: linux/amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup docker (missing on MacOS)
        if: runner.os == 'macos'
        uses: docker-practice/actions-setup-docker@fd7ecdac7caf8e2c541a48c9bcc280aae59a8461

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io/${{ github.repository_owner }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup
        # before building the container set up to use this version of ibek-support
        # and its associated version of ibek
        env:
          REPO: ${{ matrix.repo }}
        run: |
          git clone --branch main https://github.com/epics-containers/${REPO} /tmp/generic_ioc
          cp -r . /tmp/generic_ioc/ibek-support
          cp ./requirements.txt /tmp/generic_ioc

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: /tmp/generic_ioc
          platforms: ${{ matrix.platform }}
          target: runtime
          build-args: |
            IMAGE_EXT=${{ matrix.extension }}
          cache-from: type=gha,scope=${{ matrix.epics-target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.epics-target }}
          tags: ci_test
          load: true

      - name: Test image
        # can't test non native without some hardware to run on
        if: ${{ matrix.epics-target == 'linux-x86_64' }}
        run: /tmp/generic_ioc/tests/run-tests.sh ci_test
