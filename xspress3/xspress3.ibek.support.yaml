# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: xspress3

entity_models:
  - name: xspress3
    description: |-
      xspress3
    parameters:
      P:
        type: str
        description: |-
          Prefix for PV name

      PORT:
        type: str
        description: |-
          Bus/Port Address

      ADDR:
        type: int
        description: |-
          Address on the bus
        default: 0

      TIMEOUT:
        type: int
        description: |-

        default: 5

      MAX_SPECTRA:
        type: int
        description: |-


      MAX_FRAMES:
        type: int
        description: |-


      SCAN_RATE:
        type: int
        description: |-


      R:
        type: str
        description: |-
          Device Suffix
        default: ':'
      
      base_ip:
        type: str
        description: |-
          IP of xspress3 device
        default: 192.168.0.1
      
      settings_directory:
        type: str
        description: |-
          File path for the xspress3 settings


    - name: xspress3DTCPlugin
      description: |-
        xspress3DTCPlugin
      parameters:
        ENABLED:
          type: int
          description: |-

          default: 1
        NDARRAY_PORT:
          type: str
          description: |-

          default: XSP3
        P:
          type: str
          description: |-
            Prefix for PV name
        PORT:
          type: str
          description: |-

          default: XSP3.DTC
        QUEUE:
          type: int
          description: |-

        R:
          type: str
          description: |-
            Device Suffix
          default: ':'
        TIMEOUT:
          type: int
        description: |-

        default: 1
        

    pre_init:
      - value: |
          epicsEnvSet ""

    databases:
      - file: $(XSPRESS3)/db/xspress3.template
        args:
          .*:
          # P: "{{P + ':' + name + ':'}}"

    

      