# yaml-language-server: $schema=../schemas/ibek.support.schema.json

module: ADAravis

entity_models:
  - name: aravisCamera
    description: |-
      Creates an aravisCamera camera areaDetector driver
    parameters:
      ID:
        type: str
        description: |-
          Cam ip address, hostname, MAC address, or ID <manufacturer>-<serial>, (e.g. Prosilica-02-2166A-06844)

      P:
        type: str
        description: |-
          PV Prefix

      R:
        type: str
        description: |-
          PV Suffix

      PORT:
        type: id
        description: |-
          Port name for the camera

      CACHING:
        type: bool
        description: |-
          Enable/disable caching of camera parameters
        default: true

      BUFFERS:
        type: int
        description: |-
          Maximum number of NDArray buffers to be created for plugin callbacks
        default: 50

      MEMORY:
        type: int
        description: |-
          Max memory to allocate, should be maxw*maxh*nbuffer for driver and all attached plugins
        default: -1

      TIMEOUT:
        type: int
        description: |-
          Timeout, default 1
        default: 1

      ADDR:
        type: int
        description: |-
          Asyn Port address, default 0
        default: 0

      # No need for CLASS because we generate the template and pvi.device from the camera's xml

    pre_init:
      - value: |
          # aravisConfig(portName, cameraName, enableCaching, maxMemory, priority, stackSize)
          aravisConfig("{{PORT}}", "{{ID}}", {{CACHING | int}}, {{MEMORY}}, 0, 1)

    databases:
      - file: $(ADARAVIS)/db/aravisCamera.template
        args: { P, R, PORT, TIMEOUT, ADDR }

    pvi:
      yaml_path: ADAravis.pvi.device.yaml
      ui_macros:
        P:
        R:
      pv: true
      pv_prefix: $(P)$(R)

  - name: aravisSettings

    description: |
      Create detailed settings screens for an Aravis camera from one of
      the predefined database files in ADGenICam or from the auto generated
      database file for a specific camera.

      Specify which one using the CLASS parameter or leave CLASS as the
      default value to auto generate database file. In this case start.sh
      will contact the camera and generate the database file from its XML
      description of all its configuration parameters.

    parameters:
      camera:
        type: object
        description: the aravisCamera object to create settings for

    pvi:
      yaml_path: "{{ 'auto-' ~ camera.ID if camera.CLASS=='AutoADGenICam' else camera.CLASS }}.pvi.device.yaml"
      ui_macros:
        P: "{{ camera.P }}"
        R: "{{ camera.R }}"
      pv: true
      pv_prefix: "{{ camera.P }}{{ camera.R }}"

    databases:
      - file: "{{ 'auto-' ~ camera.ID if camera.CLASS=='AutoADGenICam' else camera.CLASS }}.template"
        args:
          P: "{{ camera.P }}"
          R: "{{ camera.R }}"
          PORT: "{{ camera.PORT }}"
          TIMEOUT: "{{ camera.TIMEOUT }}"
          ADDR: "{{ camera.ADDR }}"
