label: ppmacController
children:

  - type: Group
    name: Info
    layout:
      type: Grid
      labelled: true
    children:

      - type: SignalR
        name: GlobalProblem
        label: Global Problem
        read_pv: $(P):GLOBAL_PROBLEM_RBV
        read_widget:
          type: LED

      - type: SignalR
        name: FeedRateProblem
        label: Feed Rate Problem
        read_pv: $(P):FEEDRATE_PROBLEM_RBV
        read_widget:
          type: LED

      - type: SignalR
        name: PmacType
        label: PMAC Type
        read_pv: $(P):PMACTYPE
        read_widget:
          type: TextRead

      - type: SignalR
        name: CpuNumCores
        label: CPU Num Cores
        read_pv: $(P):CPUNUMCORES
        read_widget:
          type: TextRead

      - type: SignalR
        name: CpuLoad0
        label: CPU Load 0
        read_pv: $(P):CPULOAD_0
        read_widget:
          type: TextRead

      - type: SignalR
        name: CpuLoad1
        label: CPU Load 1
        read_pv: $(P):CPULOAD_1
        read_widget:
          type: TextRead

      - type: SignalR
        name: CpuLoad2
        label: CPU Load 2
        read_pv: $(P):CPULOAD_2
        read_widget:
          type: TextRead

      - type: SignalR
        name: CpuLoad3
        label: CPU Load 3
        read_pv: $(P):CPULOAD_3
        read_widget:
          type: TextRead

      - type: SignalR
        name: ServoPeriod
        label: Servo Period
        read_pv: $(P):SERVO_PERIOD
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadEcho
        label: Read Echo
        read_pv: $(P):READ_ECHO
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadCtrlStat1
        label: Ctrl Status 1
        read_pv: $(P):READ_CTRLSTAT1
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadCtrlStat2
        label: Ctrl Status 2
        read_pv: $(P):READ_CTRLSTAT2
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadCtrlStat3
        label: Ctrl Status 3
        read_pv: $(P):READ_CTRLSTAT3
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadPlcBits00
        label: PLC Bits 00
        read_pv: $(P):READ_PLCBITS00
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadPlcBits01
        label: PLC Bits 01
        read_pv: $(P):READ_PLCBITS01
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadGpioInp
        label: GPIO Input
        read_pv: $(P):READ_GPIO_INP
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadGpioOut
        label: GPIO Output
        read_pv: $(P):READ_GPIO_OUT
        read_widget:
          type: TextRead

      - type: SignalR
        name: ReadProgBits
        label: Prog Bits
        read_pv: $(P):READ_PROGBITS
        read_widget:
          type: TextRead

      - type: SignalR
        name: MacroErrors
        label: Macro Errors
        read_pv: $(P):MACROERRS
        read_widget:
          type: TextRead

      - type: SignalR
        name: IVariables
        label: I Variables
        read_pv: $(P):I_VARIABLES_RBV
        read_widget:
          type: TextRead
          format: string

      - type: SignalR
        name: PVariables
        label: P Variables
        read_pv: $(P):P_VARIABLES_RBV
        read_widget:
          type: TextRead
          format: string

      - type: SignalR
        name: MVariables
        label: M Variables
        read_pv: $(P):M_VARIABLES_RBV
        read_widget:
          type: TextRead
          format: string

  - type: Group
    name: Commands
    layout:
      type: Grid
      labelled: true
      
    children:
      - type: SignalW
        name: PollAllNow
        label: Poll All Now
        write_pv: $(P):PollAllNow
        write_widget:
          type: ToggleButton

      - type: SignalW
        name: DeferMoves
        label: Defer Moves
        write_pv: $(P):DeferMoves
        write_widget:
          type: ToggleButton

      - type: SignalW
        name: StopAll
        label: Stop All
        write_pv: $(P):StopAll
        write_widget:
          type: ToggleButton

      - type: SignalW
        name: KillAll
        label: Kill All
        write_pv: $(P):KillAll
        write_widget:
          type: ToggleButton

      - type: SignalRW
        name: AxesReadonly
        label: Axes Readonly
        write_pv: $(P):AxesReadonly
        write_widget:
          type: ToggleButton
        read_pv: $(P):AxesReadonly_RBV
        read_widget:
          type: LED

      - type: SignalRW
        name: FeedRate
        label: Feed Rate
        write_pv: $(P):FEEDRATE
        write_widget:
          type: TextWrite
        read_pv: $(P):FEEDRATE_RBV
        read_widget:
          type: TextRead

      - type: SignalW
        name: FeedRateLimit
        label: Feed Rate Limit
        write_pv: $(P):FEEDRATE_LIMIT
        write_widget:
          type: TextWrite

      - type: SignalW
        name: DisablePoll
        label: Disable Poll
        write_pv: $(P):DISABLE_POLL
        write_widget:
          type: ComboBox

      - type: SignalRW
        name: CoordinateSysGroup
        label: Coordinate Sys Group
        write_pv: $(P):COORDINATE_SYS_GROUP
        write_widget:
          type: ComboBox
        read_pv: $(P):COORDINATE_SYS_GROUP_RBV
        read_widget:
          type: TextRead

      - type: SignalW
        name: SendCmd
        label: Send Cmd
        write_pv: $(P):SendCmd
        write_widget:
          type: TextWrite
          format: string

  - type: Group
    name: Polling
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalW
        name: ReportFast
        label: Report Fast (ms)
        write_pv: $(P):REPORT_FAST
        write_widget:
          type: TextWrite

      - type: SignalW
        name: ReportMedium
        label: Report Medium (ms)
        write_pv: $(P):REPORT_MEDIUM
        write_widget:
          type: TextWrite

      - type: SignalW
        name: ReportSlow
        label: Report Slow (ms)
        write_pv: $(P):REPORT_SLOW
        write_widget:
          type: TextWrite

      - type: SignalR
        name: FastSize
        label: Fast Queue Size
        read_pv: $(P):FAST_SIZE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: MediumSize
        label: Medium Queue Size
        read_pv: $(P):MEDIUM_SIZE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: SlowSize
        label: Slow Queue Size
        read_pv: $(P):SLOW_SIZE_RBV
        read_widget:
          type: TextRead

  - type: Group
    name: Debug
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalW
        name: DebugLevel
        label: Debug Level
        write_pv: $(P):DEBUG_LEVEL
        write_widget:
          type: TextWrite

      - type: SignalW
        name: DebugAxisNo
        label: Debug Axis No
        write_pv: $(P):DEBUG_AXISNO
        write_widget:
          type: TextWrite

      - type: SignalW
        name: DebugCsNo
        label: Debug CS No
        write_pv: $(P):DEBUG_CSNO
        write_widget:
          type: TextWrite

      - type: SignalW
        name: DebugExecute
        label: Debug Execute
        write_pv: $(P):DEBUG_EXECUTE
        write_widget:
          type: TextWrite

  - type: Group
    name: Statistics
    layout:
      type: Grid
      labelled: true
    children:
      - type: SignalR
        name: StatMsgNo
        label: Msg No
        read_pv: $(P):STAT_MSG_NO_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatTotalWrite
        label: Total Write
        read_pv: $(P):STAT_TOTAL_WRITE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatTotalRead
        label: Total Read
        read_pv: $(P):STAT_TOTAL_READ_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMsgWrite
        label: Msg Write
        read_pv: $(P):STAT_MSG_WRITE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMsgRead
        label: Msg Read
        read_pv: $(P):STAT_MSG_READ_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMsgTime
        label: Msg Time
        read_pv: $(P):STAT_MSG_TIME_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMaxWrite
        label: Max Write
        read_pv: $(P):STAT_MAX_WRITE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMaxRead
        label: Max Read
        read_pv: $(P):STAT_MAX_READ_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatMaxTime
        label: Max Time
        read_pv: $(P):STAT_MAX_TIME_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatAveWrite
        label: Ave Write
        read_pv: $(P):STAT_AVE_WRITE_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatAveRead
        label: Ave Read
        read_pv: $(P):STAT_AVE_READ_RBV
        read_widget:
          type: TextRead

      - type: SignalR
        name: StatAveTime
        label: Ave Time
        read_pv: $(P):STAT_AVE_TIME_RBV
        read_widget:
          type: TextRead

