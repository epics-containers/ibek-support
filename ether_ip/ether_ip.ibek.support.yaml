# yaml-language-server: $schema=https://github.com/epics-containers/ibek/releases/download/3.0.1/ibek.support.schema.json

module: ether_ip

entity_models:
  - name: mbboDirect
    description: |-
      Simple mbboDirect record for ether_ip connection
    parameters:
      record:
        type: str
        description: |-
          Record Name

      port:
        type: str
        description: |-
          Ether_IP Port Name

      scan:
        type: str
        description: |-
          Scan Time

      tag:
        type: str
        description: |-
          Tag to address on PLC

      nobt:
        type: str
        description: |-
          Number of bits to write

  - name: EtherIPInit
    description: |-
      This creates an IP connection to a plc using the ether_ip driver
    parameters:
      device:
        type: str
        description: |-
          PV Prefix

      port:
        type: str
        description: |-
          Port Name

      ip:
        type: str
        description: |-
          IP Port of PLC

    pre_init:
      - when: first
        value: |2

          # EtherIP Initialisation
          drvEtherIP_init()
          # Define EtherIP to PLC connection
      - value: |
          drvEtherIP_define_PLC("{{port}}", "{{ip}}", 0)
    databases:
      - file: ether_ip_plcInfo.template
        args:
          port:
          device:

